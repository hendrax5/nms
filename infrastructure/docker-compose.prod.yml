version: '3.8'

services:
  # -----------------------------------------------------------------
  # 1. API GATEWAY / REVERSE PROXY (NGINX)
  # -----------------------------------------------------------------
  nginx-proxy:
    image: nginx:alpine
    container_name: nms_nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - nms_prod_network
    depends_on:
      - frontend
      - device-manager
      - keycloak
      - grafana

  # -----------------------------------------------------------------
  # 2. IDENTITY & ACCESS MANAGEMENT (KEYCLOAK PRODUCTION)
  # -----------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: nms_keycloak
    restart: always
    environment:
      KC_DB: postgres
      KC_DB_URL: ${KC_DB_URL}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_HOSTNAME_URL: ${KC_HOSTNAME_URL}
      KC_HOSTNAME_ADMIN_URL: ${KC_HOSTNAME_ADMIN_URL}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY: "edge"
      KC_HTTP_HOST: "0.0.0.0"
      KC_HTTP_RELATIVE_PATH: "/auth"
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - nms_prod_network
    depends_on:
      postgres:
        condition: service_healthy

  # -----------------------------------------------------------------
  # 3. RELATIONAL DATABASE (POSTGRESQL - INVENTORY & KEYCLOAK)
  # -----------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: nms_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - nms_prod_network
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${POSTGRES_DB}", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------
  # 4. TIME-SERIES DATABASE (TIMESCALEDB - METRICS & LOGS)
  # -----------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: nms_timescaledb
    restart: always
    environment:
      POSTGRES_USER: ${TIMESCALEDB_USER}
      POSTGRES_PASSWORD: ${TIMESCALEDB_PASSWORD}
      POSTGRES_DB: ${TIMESCALEDB_DB}
    volumes:
      - timescaledb_prod_data:/var/lib/postgresql/data
    networks:
      - nms_prod_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALEDB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------
  # 5. CACHING & SESSION (REDIS)
  # -----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: nms_redis
    restart: always
    volumes:
      - redis_prod_data:/data
    networks:
      - nms_prod_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------
  # 6. MESSAGE BROKER (RABBITMQ)
  # -----------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nms_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
    networks:
      - nms_prod_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------
  # 7. DEVICE MANAGER BACKEND (FASTAPI)
  # -----------------------------------------------------------------
  device-manager:
    build: 
      context: ../services/device_manager
    container_name: nms_device_manager
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_HOST: "postgres"
      SECRET_KEY: ${SECRET_KEY}
      KEYCLOAK_URL: "http://keycloak:8080/auth"
      TIMESCALEDB_USER: ${TIMESCALEDB_USER}
      TIMESCALEDB_PASSWORD: ${TIMESCALEDB_PASSWORD}
      TIMESCALEDB_DB: ${TIMESCALEDB_DB}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
    networks:
      - nms_prod_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # -----------------------------------------------------------------
  # 8. WORKERS & ENGINE (PYTHON)
  # -----------------------------------------------------------------
  config-backup-worker:
    build:
      context: ../services/config_backup_worker
    container_name: nms_config_backup
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - ./backups:/app/backups
    networks:
      - nms_prod_network
    deploy:
      resources:
        limits:
          memory: 512M

  poller-engine:
    build:
      context: ../services/poller_engine
    container_name: nms_poller_engine
    restart: always
    networks:
      - nms_prod_network
    depends_on:
      device-manager:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TSDB_USER: ${TIMESCALEDB_USER}
      TSDB_PASSWORD: ${TIMESCALEDB_PASSWORD}
      TSDB_NAME: ${TIMESCALEDB_DB}
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
    deploy:
      resources:
        limits:
          memory: 512M

  syslog-trap-receiver:
    build:
      context: ../services/syslog_trap_receiver
    container_name: nms_syslog_receiver
    restart: always
    ports:
      - "514:514/udp"   # Wajib diexpose agar router eksternal bisa mengirim UDP Syslog
      - "162:162/udp"   # Untuk SNMP Traps
    environment:
      DB_HOST: timescaledb
      DB_USER: ${TIMESCALEDB_USER}
      DB_PASS: ${TIMESCALEDB_PASSWORD}
      DB_NAME: ${TIMESCALEDB_DB}
    networks:
      - nms_prod_network
    depends_on:
      timescaledb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  alert-manager:
    build:
      context: ../services/alert_manager
    container_name: nms_alert_manager
    restart: always
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
    networks:
      - nms_prod_network
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  # -----------------------------------------------------------------
  # 9. FRONTEND WEB UI (REACT)
  # -----------------------------------------------------------------
  frontend:
    build:
      context: ../services/frontend
    container_name: nms_frontend
    restart: always
    networks:
      - nms_prod_network
    deploy:
      resources:
        limits:
          memory: 1G

  # -----------------------------------------------------------------
  # 10. OBSERVABILITY (GRAFANA)
  # -----------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: nms_grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: ${GF_DATABASE_NAME}
      GF_DATABASE_USER: ${GF_DATABASE_USER}
      GF_DATABASE_PASSWORD: ${GF_DATABASE_PASSWORD}
      TIMESCALEDB_PASSWORD: ${TIMESCALEDB_PASSWORD}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_prod_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - nms_prod_network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_prod_data:
  timescaledb_prod_data:
  redis_prod_data:
  rabbitmq_prod_data:
  grafana_prod_data:

networks:
  nms_prod_network:
    name: nms_prod_network
    driver: bridge
